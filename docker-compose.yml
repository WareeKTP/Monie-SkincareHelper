services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monie}
      POSTGRES_DB: ${POSTGRES_DB:-monie}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monie}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./app/backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-monie}:${POSTGRES_PASSWORD:-monie}@db:5432/${POSTGRES_DB:-monie}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./app/frontend
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
